name: Daily ASX NZ Futures Scraper

on:
  schedule:
    # 7:00 PM NZST = 07:00 UTC (during NZ Standard Time, UTC+12)
    # 7:00 PM NZDT = 06:00 UTC (during NZ Daylight Time, UTC+13)
    # Running at both times ensures 7pm is always covered year-round
    - cron: '0 6 * * *'
    - cron: '0 7 * * *'
  workflow_dispatch:  # Allows manual trigger from GitHub UI

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # Suppress Node.js 20 deprecation warning

jobs:
  scrape:
    runs-on: ubuntu-latest
    concurrency:
      group: scrape-job       # Only one instance runs at a time
      cancel-in-progress: false  # Let the first finish; queue the second

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Chrome
        run: |
          sudo apt-get update -q
          sudo apt-get install -y wget gnupg ca-certificates
          wget -q https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo apt-get install -y ./google-chrome-stable_current_amd64.deb
          google-chrome --version

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install requests beautifulsoup4 openpyxl pytz selenium webdriver-manager

      - name: Run scraper
        run: python scraper.py

      - name: Commit and push updated Excel file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add asx_nz_futures.xlsx
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "Daily scrape: $(date -u +'%Y-%m-%d %H:%M UTC')"
          # Pull with rebase in case another run pushed while this one was running
          git pull --rebase origin main
          git push
